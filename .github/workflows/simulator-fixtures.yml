name: Simulator Fixtures

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixtures:
    name: Even Hub Simulator Fixture Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install simulator runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            librsvg2-2

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run simulator fixture smoke
        run: xvfb-run -a corepack pnpm sim:fixtures

      - name: Copy simulator fixture report
        if: always()
        run: |
          if [ -f .openclaw-even-g2-node/simulator-fixtures-report.json ]; then
            cp .openclaw-even-g2-node/simulator-fixtures-report.json simulator-fixtures-report.json
          fi

      - name: Upload simulator screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: even-g2-simulator-fixtures
          path: |
            simulator-fixtures-report.json
            /tmp/even-g2-e2e-*.png
            /tmp/even-g2-e2e-*.pgm
          if-no-files-found: ignore
