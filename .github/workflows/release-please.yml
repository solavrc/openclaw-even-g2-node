name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release source
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.sha }}

      - name: Setup Node
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: corepack enable

      - name: Install root dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: corepack pnpm install --frozen-lockfile

      - name: Build Even Hub package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          corepack pnpm run pack
          mv openclaw-even-g2-node.ehpk "openclaw-even-g2-node-${{ steps.release.outputs.version }}.ehpk"

      - name: Attach Even Hub package to GitHub Release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" "openclaw-even-g2-node-${{ steps.release.outputs.version }}.ehpk" --clobber
